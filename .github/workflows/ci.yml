name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the libraries first: the dashboard typecheck consumes the BUILT
      # @uberwal/shared types. The dashboard itself uses `next build`, which is
      # env-dependent, so it is intentionally not part of CI — typecheck + tests
      # are the correctness gates here.
      - name: Build shared + mcp-server
        run: pnpm --filter @uberwal/shared --filter @uberwal/mcp-server run build

      - name: Typecheck (all packages)
        run: pnpm run typecheck

      - name: Test (all packages)
        run: pnpm run test
